steps:
  # 1. Build container image from neurodecode_backend subdirectory
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/neurodecode-backend'
      - './neurodecode_backend'

  # 2. Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/neurodecode-backend'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'neurodecode-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/neurodecode-backend'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--timeout'
      - '3600'
      - '--concurrency'
      - '1'
      - '--memory'
      - '4Gi'
      - '--set-secrets'
      - 'GEMINI_API_KEY=neurodecode-gemini-api-key:latest,NEURODECODE_ADMIN_DEBUG_TOKEN=neurodecode-admin-debug-token:latest,TELEGRAM_BOT_TOKEN=neurodecode-telegram-bot-token:latest,TELEGRAM_CHAT_ID=neurodecode-telegram-chat-id:latest'
      - '--set-env-vars'
      - 'NEURODECODE_FIRESTORE_ENABLED=1,NEURODECODE_FIRESTORE_COLLECTION=sessions,NEURODECODE_SUMMARY_MODEL=gemini-2.5-flash-lite,NEURODECODE_ADMIN_DEBUG_ENABLED=1,NEURODECODE_ADMIN_DEBUG_MAX_ITEMS=500,NEURODECODE_FCM_ENABLED=1,NEURODECODE_FIRESTORE_PUSH_DEVICE_COLLECTION=push_device_tokens'

images:
  - 'gcr.io/$PROJECT_ID/neurodecode-backend'

options:
  logging: CLOUD_LOGGING_ONLY
